<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>本地视频工作流</title>
    <link rel="stylesheet" href="/app.css?v=20260610-image-fit" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>本地视频工作流</h1>
            <p>脚本、口播、字幕、图片与成片预览</p>
          </div>
          <div class="topbar-actions">
            <a class="nav-link" href="/remix.html">链接拆解</a>
            <button id="refreshBtn" class="refresh-btn" title="刷新项目和声音">刷新</button>
          </div>
        </header>

        <div class="studio-grid">
          <section class="panel controls-panel">
            <div class="panel-head">
              <h2>创作设置</h2>
              <span class="status-pill" id="statusPill">Ready</span>
            </div>

            <label>
              项目 ID
              <input id="projectId" value="ep001" />
            </label>

            <label>
              口播声音
              <select id="voiceSelect">
                <option value="剪映沉稳男声（同款参考）">剪映沉稳男声（同款参考）</option>
              </select>
            </label>

            <div class="commerce-box">
              <h3>带货/种草模式</h3>
              <div class="mode-selector">
                <label><input type="radio" name="contentMode" value="script" checked />长文案口播</label>
                <label><input type="radio" name="contentMode" value="product" />商品种草</label>
              </div>
              <div id="productFields" class="product-fields is-hidden">
                <div class="two-col">
                  <label>
                    视频类型
                    <select id="videoType">
                      <option>商品种草</option>
                      <option>商品测评</option>
                      <option>避坑对比</option>
                      <option>美食教程</option>
                    </select>
                  </label>
                  <label>
                    目标平台
                    <select id="targetPlatform">
                      <option value="douyin">抖音</option>
                      <option value="xiaohongshu">小红书</option>
                      <option value="bilibili">哔哩哔哩</option>
                    </select>
                  </label>
                </div>
                <label>
                  商品名
                  <input id="productName" placeholder="例如：厨房一次性抹布" />
                </label>
                <div class="two-col">
                  <label>
                    商品类目
                    <select id="productCategory">
                      <option>厨房清洁耗材</option>
                      <option>调味品/酱料</option>
                      <option>厨房用品</option>
                      <option>小家电</option>
                      <option>食材/半成品</option>
                      <option>家居日用</option>
                    </select>
                  </label>
                  <label>
                    价格
                    <input id="productPrice" placeholder="19.9" />
                  </label>
                </div>
                <label>
                  佣金/利润
                  <input id="productCommission" placeholder="例如：30% 或 6元/单" />
                </label>
                <label>
                  痛点场景
                  <textarea id="painPoint" class="mini-textarea" placeholder="例如：洗碗布总是油腻发臭"></textarea>
                </label>
                <label>
                  核心卖点
                  <textarea id="sellingPoints" class="mini-textarea" placeholder="例如：干湿两用、用完即丢、不容易掉絮"></textarea>
                </label>
                <label>
                  商品链接/备注
                  <input id="productLink" placeholder="可粘贴商品链接或选品备注" />
                </label>
              </div>
            </div>

            <div class="two-col">
              <label>
                文案文件路径
                <span class="file-picker">
                  <input id="scriptPath" placeholder="选择 .txt / .md / .docx" />
                  <button id="scriptPickBtn" type="button" class="secondary">选择</button>
                  <input id="scriptFileInput" class="native-file" type="file" accept=".txt,.md,.markdown,.docx,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
                </span>
              </label>
              <label>
                语速估算
                <input id="charsPerSecond" type="number" value="4.8" min="2" max="8" step="0.1" />
              </label>
              <label>
                目标时长（秒）
                <input id="targetDuration" type="number" min="5" max="3600" step="1" placeholder="留空按口播长度" />
              </label>
            </div>

            <label class="grow">
              直接粘贴长文案
              <textarea id="scriptText" placeholder="也可以直接把完整口播稿粘贴到这里。"></textarea>
            </label>

            <div class="asset-box">
              <h3>素材</h3>
              <div class="platform-selector" aria-label="目标平台">
                <span>目标平台</span>
                <label><input type="checkbox" name="platform" value="bilibili" checked />哔哩哔哩</label>
                <label><input type="checkbox" name="platform" value="douyin" checked />抖音</label>
                <label><input type="checkbox" name="platform" value="xiaohongshu" checked />小红书</label>
              </div>
              <div class="field-label">
                <span>自定义 BGM 路径</span>
                <div class="bgm-mode-tabs" aria-label="BGM 来源">
                  <label><input type="radio" name="bgmMode" value="library" checked />中文免费 BGM 库</label>
                  <label><input type="radio" name="bgmMode" value="local" />本地音频文件</label>
                </div>
                <div id="bgmLibraryPanel" class="bgm-library-panel">
                  <select id="bgmSourceSelect"></select>
                  <div class="bgm-source-note" id="bgmSourceNote">加载素材库...</div>
                  <span class="file-picker">
                    <input id="bgmUrl" placeholder="粘贴中文素材站音频下载 URL，例如 .mp3 / .wav" />
                    <button id="bgmDownloadBtn" type="button" class="secondary">导入</button>
                  </span>
                  <button id="bgmOpenSourceBtn" type="button" class="secondary">打开素材库</button>
                </div>
                <div id="bgmLocalPanel" class="bgm-local-panel is-hidden">
                  <span class="file-picker">
                    <textarea id="bgmPath" class="path-list" placeholder="选择一个或多个 BGM 文件"></textarea>
                    <button id="bgmPickBtn" type="button" class="secondary">选择</button>
                    <input id="bgmFileInput" class="native-file" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.aiff,.aif,.ogg,.flac" multiple />
                  </span>
                </div>
              </div>

              <label>
                图片路径，每行一个
                <span class="file-picker">
                  <textarea id="imagePaths" class="small-textarea" placeholder="选择一张或多张图片"></textarea>
                  <button id="imagePickBtn" type="button" class="secondary">选择</button>
                  <input id="imageFileInput" class="native-file" type="file" accept="image/*,.png,.jpg,.jpeg,.webp" multiple />
                </span>
              </label>
            </div>

            <div class="actions">
              <button id="voiceBtn">生成视频</button>
              <button id="alignBtn" class="secondary">校准字幕</button>
              <button id="previewBtn" class="secondary">播放预览</button>
            </div>
            <div id="generationProgress" class="generation-progress" aria-live="polite">
              <div class="generation-progress-head">
                <span id="generationProgressLabel">等待生成</span>
                <strong id="generationProgressValue">0%</strong>
              </div>
              <div class="progress-track">
                <div id="generationProgressBar" class="progress-bar"></div>
              </div>
            </div>
          </section>

          <section class="panel preview-panel">
            <div class="panel-head">
              <h2>视频预览</h2>
              <strong id="subtitleState" class="state-text">未生成</strong>
            </div>

            <div class="preview-stage">
              <div id="visualFrame" class="visual-frame">
                <span>点击播放预览后显示画面和字幕</span>
              </div>
              <div id="liveSubtitle" class="live-subtitle">等待播放</div>
              <video id="previewVideo" controls playsinline></video>
              <div class="preview-seek">
                <span id="previewCurrentTime">00:00</span>
                <input id="previewSeek" type="range" min="0" max="0" step="0.01" value="0" />
                <span id="previewDuration">00:00</span>
              </div>
            </div>

            <h3>字幕预览</h3>
            <pre id="subtitlePreview" class="subtitle-preview">生成或校准字幕后会显示在这里。</pre>
          </section>

          <aside class="panel library-panel">
            <div class="panel-head">
              <h2>工作台</h2>
              <button id="clearLogBtn" class="text-btn">清空</button>
            </div>

            <div class="library-tabs" role="tablist" aria-label="右侧工作台">
              <button class="library-tab is-active" type="button" data-tab="overview">概览</button>
              <button class="library-tab" type="button" data-tab="projects">项目</button>
              <button class="library-tab" type="button" data-tab="growth">增长</button>
              <button class="library-tab" type="button" data-tab="publish">发布</button>
              <button class="library-tab" type="button" data-tab="debug">调试</button>
            </div>

            <section class="library-pane is-active" data-pane="overview">
              <div class="metrics">
                <div>
                  <span>项目</span>
                  <strong id="projectCount">0</strong>
                </div>
                <div>
                  <span>声音</span>
                  <strong id="voiceCount">0</strong>
                </div>
              </div>
              <div id="analyticsBox" class="analytics-box"></div>
            </section>

            <section class="library-pane" data-pane="projects">
              <div class="project-toolbar">
                <label class="select-all-control">
                  <input id="selectAllProjects" type="checkbox" />
                  <span>全选</span>
                </label>
                <span id="selectedProjectCount" class="selection-count">已选 0</span>
                <button id="clearProjectSelectionBtn" type="button" class="text-btn">取消选择</button>
                <button id="deleteProjectsBtn" type="button" class="danger-btn" disabled>删除</button>
              </div>
              <div id="projectList" class="project-list"></div>
            </section>

            <section class="library-pane" data-pane="growth">
              <div id="selectedProjectBox" class="selected-project-box"></div>
              <div id="growthWorkspace" class="tab-workspace"></div>
            </section>

            <section class="library-pane" data-pane="publish">
              <div id="publishWorkspace" class="tab-workspace"></div>
            </section>

            <section class="library-pane" data-pane="debug">
              <h3>调试输出</h3>
              <pre id="resultBox" class="result-box">等待操作...</pre>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
